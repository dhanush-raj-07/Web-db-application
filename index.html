<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyNet Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-50 dark:bg-slate-950 text-gray-900 dark:text-gray-100 font-sans transition-colors duration-300">

    <div class="min-h-screen flex">
        <aside class="w-64 bg-slate-900 text-white p-6 hidden md:block flex-shrink-0">
            <h1 class="text-2xl font-bold flex items-center gap-2 mb-10 text-blue-400">
                <i data-lucide="zap" fill="currentColor"></i> SkyNet Pro
            </h1>
            <nav class="space-y-2">
                <button onclick="showTab('users')" id="btn-users" class="w-full flex items-center gap-3 p-3 rounded-xl transition-all nav-link bg-blue-600">
                    <i data-lucide="users"></i> Users
                </button>
                <button onclick="showTab('analysis')" id="btn-analysis" class="w-full flex items-center gap-3 p-3 rounded-xl transition-all nav-link text-slate-400 hover:bg-slate-800">
                    <i data-lucide="bar-chart-3"></i> Analysis
                </button>
                <button onclick="showTab('settings')" id="btn-settings" class="w-full flex items-center gap-3 p-3 rounded-xl transition-all nav-link text-slate-400 hover:bg-slate-800">
                    <i data-lucide="settings"></i> Settings
                </button>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            
            <section id="view-users" class="tab-content">
                <header class="flex justify-between items-center mb-8">
                    <div>
                        <h2 class="text-3xl font-black">User Directory</h2>
                        <p class="text-gray-500 dark:text-gray-400">Manage and filter your user database.</p>
                    </div>
                    <button onclick="toggleModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-blue-500/20 flex items-center gap-2">
                        <i data-lucide="user-plus"></i> New User
                    </button>
                </header>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-gray-100 dark:border-slate-800 shadow-sm">
                        <p class="text-sm font-bold text-gray-400 uppercase mb-1">Total Users</p>
                        <h3 id="statTotal" class="text-4xl font-black text-blue-600">0</h3>
                    </div>
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-gray-100 dark:border-slate-800 shadow-sm relative overflow-hidden">
                        <canvas id="miniChart" height="80"></canvas>
                    </div>
                </div>

                <div class="bg-white dark:bg-slate-900 rounded-3xl border border-gray-100 dark:border-slate-800 shadow-sm overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 dark:bg-slate-800/50">
                            <tr>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">User</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase">Email</th>
                                <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="userTable" class="divide-y divide-gray-50 dark:divide-slate-800"></tbody>
                    </table>
                </div>
            </section>

            <section id="view-analysis" class="tab-content hidden">
                <h2 class="text-3xl font-black mb-6">Data Analysis</h2>
                <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl border border-gray-100 dark:border-slate-800 shadow-sm">
                    <h4 class="font-bold mb-4">Distribution of Users</h4>
                    <div class="max-w-md mx-auto">
                        <canvas id="mainChart"></canvas>
                    </div>
                    <div class="mt-8 grid grid-cols-2 gap-4">
                        <div class="p-4 bg-gray-50 dark:bg-slate-800 rounded-2xl text-center">
                            <p class="text-sm text-gray-400">Database Size</p>
                            <p id="dbSize" class="text-xl font-bold">0 KB</p>
                        </div>
                        <div class="p-4 bg-gray-50 dark:bg-slate-800 rounded-2xl text-center">
                            <p class="text-sm text-gray-400">Avg Growth</p>
                            <p class="text-xl font-bold text-green-500">+12%</p>
                        </div>
                    </div>
                </div>
            </section>

            <section id="view-settings" class="tab-content hidden">
                <h2 class="text-3xl font-black mb-6">Settings</h2>
                <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl border border-gray-100 dark:border-slate-800 shadow-sm space-y-6">
                    <div class="flex items-center justify-between p-4 bg-gray-50 dark:bg-slate-800 rounded-2xl">
                        <div>
                            <p class="font-bold">Dark Mode</p>
                            <p class="text-sm text-gray-500">Toggle high-contrast dark interface</p>
                        </div>
                        <button onclick="toggleDarkMode()" id="darkModeBtn" class="w-14 h-8 bg-gray-300 dark:bg-blue-600 rounded-full relative transition-all">
                            <div class="w-6 h-6 bg-white rounded-full absolute top-1 left-1 dark:left-7 transition-all"></div>
                        </button>
                    </div>
                    <button onclick="resetDB()" class="w-full p-4 text-red-500 font-bold border-2 border-red-100 dark:border-red-900/30 rounded-2xl hover:bg-red-50 dark:hover:bg-red-900/10 transition-all">
                        Wipe Database (Danger Zone)
                    </button>
                </div>
            </section>

        </main>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center backdrop-blur-sm z-50">
        <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <h3 class="text-2xl font-black mb-6">Add New Member</h3>
            <input type="text" id="name" placeholder="Name" class="w-full p-4 mb-4 bg-gray-50 dark:bg-slate-800 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-6 bg-gray-50 dark:bg-slate-800 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none">
            <div class="flex gap-3">
                <button onclick="toggleModal()" class="flex-1 p-4 font-bold text-gray-400">Cancel</button>
                <button onclick="addUser()" class="flex-1 p-4 bg-blue-600 text-white font-bold rounded-2xl shadow-lg shadow-blue-500/30">Save</button>
            </div>
        </div>
    </div>

    <script>
        let allUsers = [];
        let myChart, miniChart;

        // TAB SYSTEM
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(el => el.className = 'w-full flex items-center gap-3 p-3 rounded-xl transition-all nav-link text-slate-400 hover:bg-slate-800');
            
            document.getElementById(`view-${tabName}`).classList.remove('hidden');
            document.getElementById(`btn-${tabName}`).className = 'w-full flex items-center gap-3 p-3 rounded-xl transition-all nav-link bg-blue-600 text-white shadow-lg shadow-blue-900/20';
            
            if(tabName === 'analysis') updateAnalysisCharts();
        }

        // DARK MODE
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark);
            updateAnalysisCharts(); // Refresh charts for theme
        }

        // Apply saved theme
        if (localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark');

        // CRUD & ANALYSIS DATA
        async function fetchUsers() {
            const res = await fetch('/users');
            allUsers = await res.json();
            document.getElementById('statTotal').innerText = allUsers.length;
            renderTable(allUsers);
            updateMiniChart();
        }

        function renderTable(users) {
            const table = document.getElementById('userTable');
            table.innerHTML = users.map(u => `
                <tr class="hover:bg-gray-50 dark:hover:bg-slate-800/50 transition-all">
                    <td class="px-6 py-5 font-bold">${u.name}</td>
                    <td class="px-6 py-5 text-gray-500">${u.email}</td>
                    <td class="px-6 py-5 text-right">
                        <button onclick="deleteUser(${u.id})" class="text-red-400 hover:text-red-600 p-2"><i data-lucide="trash-2" size="18"></i></button>
                    </td>
                </tr>
            `).join('');
            lucide.createIcons();
        }

        function updateMiniChart() {
            const ctx = document.getElementById('miniChart').getContext('2d');
            if(miniChart) miniChart.destroy();
            miniChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: allUsers.map((_, i) => i),
                    datasets: [{ data: allUsers.map(u => u.id), borderColor: '#3b82f6', fill: true, backgroundColor: 'rgba(59, 130, 246, 0.1)', tension: 0.4 }]
                },
                options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        }

        function updateAnalysisCharts() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if(myChart) myChart.destroy();
            const isDark = document.documentElement.classList.contains('dark');
            
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Active', 'Pending'],
                    datasets: [{
                        data: [allUsers.length, 5],
                        backgroundColor: ['#3b82f6', '#e2e8f0'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { labels: { color: isDark ? '#fff' : '#000' } } } }
            });
        }

async function addUser() {
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;

    if (!name || !email) return notify("Fields cannot be empty", "error");

    try {
        const res = await fetch('/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email })
        });

        if (res.ok) {
            notify("User Saved Successfully!");
            toggleModal(); // Close the popup
            fetchUsers();  // REFRESH the table and charts
            
            // Clear the inputs
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
        } else {
            notify("Error: Email might already exist", "error");
        }
    } catch (err) {
        notify("Server not found. Are you using GitHub Pages?", "error");
    }
}
            if(res.ok) {
                toggleModal();
                fetchUsers();
                Toastify({ text: "User Added!", style: { background: "#10b981" } }).showToast();
            }
        }

        async function deleteUser(id) {
            await fetch(`/users/${id}`, { method: 'DELETE' });
            fetchUsers();
            Toastify({ text: "User Removed", style: { background: "#ef4444" } }).showToast();
        }

        function toggleModal() { document.getElementById('modal').classList.toggle('hidden'); }

        lucide.createIcons();
        fetchUsers();
    </script>
</body>

</html>
